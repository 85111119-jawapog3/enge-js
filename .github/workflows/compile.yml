name: Build PSX Emulator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mdlr-server:
        image: retakenroots/mdlr:latest
        # Internal port is 443
        ports:
          - 8443:443
        volumes:
          - ${{ github.workspace }}/user:/app/user

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Directories
        run: mkdir -p docs

      - name: Execute Build
        run: |
          # We use the service alias 'mdlr-server' instead of localhost.
          # We wait up to 30s for the server to actually start responding.
          
          echo "Waiting for mdlr-server to respond..."
          timeout 30s bash -c 'until curl --insecure -s -f https://mdlr-server/ > /dev/null; do sleep 2; done' || true
          
          # Run the command directly
          curl --insecure -s "https://mdlr-server/bundle/unit/enge:psx:webgl" | gunzip > docs/index.js
          
          # Verify the file was created and isn't empty
          if [ -s docs/index.js ]; then
            echo "Build successful: docs/index.js created."
          else
            echo "Error: docs/index.js is empty or was not created."
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psx-bundle
          path: docs/index.js
