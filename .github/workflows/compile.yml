name: Build PSX Emulator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mdlr-server:
        image: retakenroots/mdlr:latest
        ports:
          - 8443:443
        volumes:
          - ${{ github.workspace }}/user:/app/user

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Directories
        run: mkdir -p docs

      - name: Execute Build Script
        run: |
          # 1. Make script executable
          chmod +x build.sh
          
          # 2. Update localhost to use the mapped port 8443
          sed -i 's/localhost\(:[0-9]\+\)\?/localhost:8443/g' build.sh
          
          # 3. Wait for the server to be ready manually 
          # This loops until the port is open or 30 seconds pass
          echo "Waiting for mdlr-server on port 8443..."
          timeout 30s bash -c 'until printf "" 2>>/dev/null >>/dev/dev/tcp/127.0.0.1/8443; do sleep 2; done' || true
          
          # 4. Run the build
          ./build.sh
        env:
          CURL_FLAGS: "--insecure"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psx-bundle
          path: docs/index.js
