name: Build PSX Emulator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mdlr-server:
        image: retakenroots/mdlr:latest
        ports:
          - 8443:443
        volumes:
          - ${{ github.workspace }}/user:/app/user

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Directories
        run: mkdir -p docs

      - name: Execute Build
        run: |
          # We use the service name 'mdlr-server' as the hostname.
          # GitHub Actions links these automatically.
          
          echo "Waiting for mdlr-server to wake up..."
          # This loop checks the health of the service before we try to pull the bundle
          timeout 60s bash -c 'until curl --insecure -s -f https://mdlr-server/ > /dev/null; do echo "Still waiting..."; sleep 2; done'
          
          echo "Downloading and unzipping bundle..."
          curl --insecure -s "https://mdlr-server/bundle/unit/enge:psx:webgl" | gunzip > docs/index.js
          
          # Final sanity check: make sure the file actually has content
          if [ -s docs/index.js ]; then
            echo "Success! docs/index.js created."
          else
            echo "Error: docs/index.js is empty. Check server logs."
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psx-bundle
          path: docs/index.js
