name: Build PSX Emulator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mdlr-server:
        image: retakenroots/mdlr:latest
        ports:
          - 8443:443
        volumes:
          - ${{ github.workspace }}/user:/app/user
        # The health check ensures the container is ready before the job starts
        options: >-
          --health-cmd "curl -k -f https://localhost/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Directories
        run: mkdir -p docs

      - name: Execute Build Script
        run: |
          # 1. Make the script executable
          chmod +x build.sh
          
          # 2. Update localhost to use the mapped port 8443. 
          # Using a more robust regex to avoid double-port issues (e.g., localhost:443:8443)
          sed -i 's/localhost\(:[0-9]\+\)\?/localhost:8443/g' build.sh
          
          # 3. Run the build
          ./build.sh
        env:
          # Bypass SSL certificate checks for the local service
          CURL_FLAGS: "--insecure"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psx-bundle
          path: docs/index.js
