name: Build PSX Emulator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mdlr-server:
        image: retakenroots/mdlr:latest
        # Map both common ports just in case
        ports:
          - 8443:443
          - 8080:80
        volumes:
          - ${{ github.workspace }}/user:/app/user

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Directories
        run: mkdir -p docs

      - name: Execute Build
        run: |
          # We check port 80 (http) and 443 (https)
          echo "Probing mdlr-server..."
          
          # Try to find which port is active
          timeout 60s bash -c '
          until curl -s -f http://mdlr-server/ > /dev/null || curl --insecure -s -f https://mdlr-server/ > /dev/null; do
            echo "Waiting for server to bind to a port..."
            sleep 2
          done'

          echo "Server is up! Attempting bundle download..."
          
          # Attempt download. We try HTTP first, then HTTPS if that fails.
          curl -s -f "http://mdlr-server/bundle/unit/enge:psx:webgl" | gunzip > docs/index.js || \
          curl --insecure -s -f "https://mdlr-server/bundle/unit/enge:psx:webgl" | gunzip > docs/index.js

          if [ -s docs/index.js ]; then
            echo "Success: docs/index.js created."
          else
            echo "Error: Download failed or file is empty."
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psx-bundle
          path: docs/index.js
